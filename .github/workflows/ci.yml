name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f nexus-kb-server/requirements.txt ]; then pip install -r nexus-kb-server/requirements.txt; fi
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 nexus-kb-server --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 nexus-kb-server --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  build-client:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install and Build Client
      run: |
        cd nexus-kb-client
        npm install
        npm run build
